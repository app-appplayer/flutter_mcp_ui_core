name: flutter_mcp_ui_core
description: Core models, constants, and utilities for Flutter MCP UI system. Shared foundation for renderer and generator packages.
version: 0.3.1
homepage: https://app-appplayer.github.io/makemind
repository: https://github.com/app-appplayer/flutter_mcp_ui_core
issue_tracker: https://github.com/app-appplayer/flutter_mcp_ui_core/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.9.0
  collection: ^1.18.0
  json_schema: ^5.1.1
  material_color_utilities: ^0.13.0
  mcp_bundle: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.24.0

topics:
  - ui
  - json
  - mcp
  - flutter
  - widgets